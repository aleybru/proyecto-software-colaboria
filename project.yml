####################################################
# PROJECT MANIFEST — L1
# Proyecto ColaborIA
# Configuracion especifica de este proyecto.
# Se usa junto con PROTOCOLO-OPERATIVO-MULTIPROYECTO-v1.md (L0, generico)
# y las instrucciones de comportamiento del proyecto (L2/L3 destilado).
####################################################

project:
  name: ColaborIA
  type: software
  description: >
    Plataforma que formaliza y automatiza el protocolo de writer's room
    de Chapu y Papu trabajando junto a Dani. ColaborIA es simultaneamente
    el producto que se construye y su propio primer POC de software
    (dogfooding): el desarrollo de la app se gestiona con el mismo
    protocolo que la app va a automatizar.

scope:
  isolation: strict
  # Ningun contenido de otros proyectos (Codigo del Alma, futuros proyectos)
  # se usa aca salvo que Dani lo traiga el mismo, explicitamente, a la
  # conversacion activa. Ver PROTOCOLO-OPERATIVO-MULTIPROYECTO-v1.md seccion 6.4.

repositories:
  governance: aleybru/proyecto-software-colaboria
  code: aleybru/proyecto-software-colaboria-codigo

drive:
  root_folder: "Proyecto ColaborIA"
  subfolders:
    - documentacion/      # bootstrap comun compartido, en desuso una vez migrado al repo
    - "Chapu Agent/"       # documentos generados por Claude
    - "Papu Agent/"        # documentos generados por GPT

agents:
  chapu:
    enabled: true
    platform: Claude (Claude.ai)
    access_model: token_por_sesion
    # El acceso de Chapu al repositorio de gobernanza NO es persistente.
    # Requiere que Dani provea un token de GitHub (fine-grained, expiracion
    # corta) en cada sesion de trabajo que necesite leer o escribir el repo.
  papu:
    enabled: true
    platform: ChatGPT

protocol:
  version: 1.0
  source: PROTOCOLO-OPERATIVO-MULTIPROYECTO-v1.md
  last_validated_at: 2026-07-06
  # Fecha del ultimo cold-start exitoso de Chapu en este proyecto (9.5/10).
  # Actualizar esta fecha cada vez que se corra el test de arranque en frio
  # de nuevo (por ejemplo, tras cargar una version nueva del protocolo o
  # de este manifiesto).

decisiones_vigentes_del_proyecto:
  # Resumen; el detalle completo vive en decisions/ del repo de gobernanza
  # una vez migrado.
  - id: DEC-C01
    resumen: ColaborIA es su propio POC de software (dogfooding).
  - id: DEC-C02
    resumen: Dos repositorios separados, gobernanza y codigo (ver arriba).
  - id: DEC-C03
    resumen: Modo automatico acotado solo para tareas con criterio de exito verificable por maquina.
  - id: DEC-C04
    resumen: Capacidades con efectos secundarios reales requieren opt-in explicito de Dani por tarea.
  - id: DEC-C06
    resumen: Primer test de portabilidad de identidad de Chapu aprobado 9.5/10.
  - id: DEC-C08
    resumen: >
      Claude Code opera como ejecutor de codigo (no autoridad de decision).
      Cola durable code-tasks/ en el repo de gobernanza, separada de handoffs/.
      Gatillo manual de ejecucion (operacionaliza DEC-C04, no la modifica).
      Repo destino y criterio de exito obligatorios por tarea. Una tarea por
      archivo. Detalle de implementacion (YAML, plantilla) vive aparte en rules/.
  - id: DEC-C09
    resumen: >
      Arquitectura V0: Postgres como motor de DB operacional (no fuente de
      verdad de gobernanza, eso sigue en el repo). Tablas projects y
      project_resources (recursos no hardcodeados como columnas). Tabla
      credentials con cifrado reversible, clave fuera de DB (alcance
      por-proyecto vs global aun pendiente). Agentes fuera de DB, en config
      estatica. Convencion de nombres adoptada para repos/Drive. Context y
      Governance Engine no se implementan completos en V0, se preserva la
      costura conceptual. Stack tecnico resuelto 2026-07-11: backend .NET/
      ASP.NET Core + EF Core + Npgsql, frontend Angular. Credentials resuelto
      2026-07-11: scope_type global/project, direccion GitHub App/installation
      tokens (no PAT manual) para auth de la app en produccion. Monorepo de
      codigo con carpetas backend/ y frontend/ (DEC-C02 no se modifica, sigue
      siendo un solo repo de codigo).
  - id: DEC-C10
    resumen: >
      APROBADA 2026-07-18. Canal conversacional V0: sessions con project_id
      obligatorio, messages como fuente de verdad de contenido y agent_turns
      como bitacora de ejecucion, idempotencia de mensaje entrante,
      timeouts/retry de turnos, politica de fallo en rondas both_sequential,
      input_context_ref trazable, floor lock bajo autoridad exclusiva del
      backend, deprecacion futura de handoffs/quick/log.md una vez el canal
      este validado, handoffs/active/ se conserva, politica de durabilidad
      (DB operativa pero objetos auditables se materializan en el repo).
  - id: DEC-C11
    resumen: >
      APROBADA 2026-07-18. ColaborIA como interfaz operativa unica: Dani ya
      no coordina manualmente entre ChatGPT/Claude/Claude Code, todo pasa por
      ColaborIA. Matriz de accesos: Papu lectura+escritura solo en repo
      gobernanza, lectura en repo codigo y Drive; Chapu lectura+escritura en
      los tres. Flujo objetivo conversacion->propuesta->decision->tarea->
      ejecucion->resultado. Prioridad de roadmap: vertical slice operativa.
  - id: DEC-C12
    resumen: >
      PROPUESTA, pendiente aprobacion. Reemplaza borrador anterior (GitHub
      Projects, descartado). ColaborIA como superficie de planificacion propia,
      nucleo comun de "elemento planificable" compartido con DEC-C13, Kanban
      generico (backlog/listo/en curso/bloqueado/hecho/cancelado). Relacion
      con code-tasks/*.md: BD es estado operativo, archivo es materializacion
      durable, sincronizacion unidireccional por checkpoints (creacion,
      gatillo manual, cierre, cancelacion), no bidireccional continua. Fija
      arquitectura conceptual, no esquema fisico de Postgres.
  - id: DEC-C13
    resumen: >
      PROPUESTA, pendiente aprobacion. Roadmap/timeline construido sobre el
      mismo nucleo de elemento planificable de DEC-C12 (no modelo aparte).
      Soporta roadmap temporal (fechas) y ordinal (solo secuencia/dependencia)
      sin obligar a inventar fechas. Un elemento puede estar en Kanban y
      roadmap simultaneamente sin sincronizacion aparte. Boundary explicito
      con mapa de tramas narrativo (DEC-C14, modelo de dominio distinto).
  - id: DEC-C14
    resumen: >
      PROPUESTA, pendiente aprobacion. Especializacion narrativa: mapa de
      tramas (trama/arco, eje temporal narrativo, evento/beat, cruces entre
      tramas) como modelo de dominio propio, no una vista de Kanban ni de
      roadmap generico. Menor urgencia (no hay proyecto narrativo activo hoy)
      pero se disena en esta misma ronda para no forzar refactor futuro.

rol_chapu_en_este_proyecto:
  prioridades:
    - consistencia longitudinal entre decisiones y codigo
    - arquitectura tecnica
    - impacto acumulativo de cambios
    - recuperacion historica de decisiones
    - revision de divergencias entre documentacion e implementacion
  nota: >
    Prioridades de partida, no exclusividad ni division rigida de tareas
    (ver PROTOCOLO-OPERATIVO-MULTIPROYECTO-v1.md seccion 7).
